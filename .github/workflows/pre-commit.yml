name: Pre-commit Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: ${{ github.repository }}-${{ github.event.number }}-${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  pull-requests: read

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-slim
    if: false

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: cmake-format check
      run: |
        pip install pre-commit
        pre-commit install 
        pre-commit run cmake-format -a
    
    - name: clang-format
      run: pre-commit run clang-format -a